name: Vyuta CI

# Lean CI for the Vyuta drone-IDE fork. The inherited VS Code build/test
# workflows were removed (they require Microsoft's build infrastructure and
# self-hosted runners); this verifies the Vyuta-specific monorepo instead:
# the Rust workspace and the drone-telemetry extension.
#
# Each job tolerates the absence of its target directory so that `main` (the
# clean VS Code fork baseline, which does not carry the robotics code) stays
# green; the real checks run on the development branches / PRs that add them.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: vyuta-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect rust workspace
        id: detect
        run: |
          if [ -d rust ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::rust/ not present on this ref — skipping Rust checks"
          fi
      - if: steps.detect.outputs.present == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - if: steps.detect.outputs.present == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Format check
        if: steps.detect.outputs.present == 'true'
        working-directory: rust
        run: cargo fmt --all --check
      - name: Clippy
        if: steps.detect.outputs.present == 'true'
        working-directory: rust
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Build
        if: steps.detect.outputs.present == 'true'
        working-directory: rust
        run: cargo build --workspace --all-targets
      - name: Test
        if: steps.detect.outputs.present == 'true'
        working-directory: rust
        run: cargo test --workspace

  extension:
    name: drone-telemetry extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect extension
        id: detect
        run: |
          if [ -d extensions/drone-telemetry ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::extensions/drone-telemetry not present on this ref — skipping"
          fi
      - if: steps.detect.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install
        if: steps.detect.outputs.present == 'true'
        working-directory: extensions/drone-telemetry
        run: npm install --no-audit --no-fund
      - name: Compile (tsc)
        if: steps.detect.outputs.present == 'true'
        working-directory: extensions/drone-telemetry
        run: npm run compile
